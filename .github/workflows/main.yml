name: Build Legacy Manual

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Asciidoctor
        run: |
          gem install asciidoctor

      - name: Build AsciiDoc manual
        run: |
          declare revdate=$(git log -1 --date=format:'%Y-%m-%d' --format=%cd)
          sed -i.bak "s/@REVDATE@/${revdate}/" Manual.asciidoc
          ./scripts/fix_latexmath
          mkdir -p build/figures
          mkdir -p build/logos
          cp Manual.adoc index.adoc
          asciidoctor -r ./extensions/feature_blocks.rb -a stylesheet=./stylesheets/readthedocs.css -d book --destination-dir build index.adoc
          cp -rv figures/* build/figures
          cp -rv logos/* build/logos

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
